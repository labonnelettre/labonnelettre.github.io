<style>
.sib-form { background: transparent !important; padding: 0 !important; margin: 0 !important; }
#sib-form-container, #sib-container { background: transparent !important; border: none !important; max-width: 100% !important; padding: 0 !important; }
#sib-form .entry__label { display: none !important; }
.sib-form__declaration { display: none !important; }
#sib-form .form__label-row { margin: 0 !important; }
#sib-form .sib-form-block { padding: 0 !important; }
#sib-form .form__entry { margin: 0 !important; }
#sib-form input[type="text"].input { width:100% !important; padding:14px 18px !important; border:1.5px solid var(--bord) !important; border-radius:10px !important; font-size:14px !important; font-family:'DM Sans',sans-serif !important; background:#fff !important; color:var(--txt) !important; outline:none !important; box-sizing:border-box !important; transition:border .2s !important; }
#sib-form input[type="text"].input:focus { border-color:var(--vert) !important; }
#sib-form input[type="text"].input::placeholder { color:var(--txt3) !important; }
#sib-form .sib-form-block__button { background:var(--vert) !important; border-radius:10px !important; font-family:'DM Sans',sans-serif !important; font-size:14px !important; font-weight:500 !important; padding:14px 28px !important; width:100% !important; transition:background .2s !important; white-space:nowrap !important; border:none !important; box-shadow:none !important; outline:none !important; color:#fff !important; }
#sib-form .sib-form-block__button:hover { background:var(--vert-l) !important; }
.sib-form-block__button-with-loader::after { display:none !important; }
.input_replaced { display:inline-block !important; opacity:1 !important; visibility:visible !important; width:14px !important; height:14px !important; position:relative !important; accent-color:var(--vert) !important; cursor:pointer !important; flex-shrink:0 !important; }
.checkbox.checkbox_tick_positive { display:none !important; }
#sib-container .sib-form-block { border:none !important; box-shadow:none !important; background:transparent !important; }
</style>
<style>
:root {
  --vert:    #2D5A3D;
  --vert-l:  #3D7A52;
  --vert-xl: #EBF4EE;
  --vert-xs: #F5FAF6;
  --creme:   #FAF8F3;
  --or:      #C9A84C;
  --or-l:    #F0E4C0;
  --txt:     #1A1A18;
  --txt2:    #5A5A52;
  --txt3:    #9A9A90;
  --bord:    #E8E4DA;
  --white:   #FFFFFF;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--creme);color:var(--txt);line-height:1.6;overflow-x:hidden;}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;background:rgba(250,248,243,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--bord);transition:all .3s;}
.nav-logo{display:flex;align-items:center;gap:10px;}
.nav-logo-icon{width:32px;height:32px;background:var(--vert);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.nav-logo-icon svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2;}
.nav-logo-text{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--vert);}
.nav-links{display:flex;align-items:center;gap:28px;}
.nav-links a{font-size:13px;color:var(--txt2);text-decoration:none;transition:color .2s;}
.nav-links a:hover{color:var(--vert);}
.nav-cta{background:var(--vert);color:#fff;font-size:13px;font-weight:500;padding:9px 20px;border-radius:8px;text-decoration:none;transition:background .2s;}
.nav-cta:hover{background:var(--vert-l);}

/* ── HERO ── */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:100px 24px 60px;text-align:center;position:relative;overflow:hidden;}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(45,90,61,.07) 0%,transparent 70%);pointer-events:none;}
.hero-pattern{position:absolute;inset:0;opacity:.025;background-image:repeating-linear-gradient(0deg,var(--vert) 0px,var(--vert) 1px,transparent 1px,transparent 40px),repeating-linear-gradient(90deg,var(--vert) 0px,var(--vert) 1px,transparent 1px,transparent 40px);pointer-events:none;}
.hero-badge{display:inline-flex;align-items:center;gap:7px;background:var(--vert-xl);border:1px solid rgba(45,90,61,.2);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:500;color:var(--vert);margin-bottom:28px;animation:fadeUp .6s ease both;}
.hero-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--vert);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(1.3);}}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(38px,6vw,68px);font-weight:800;line-height:1.1;letter-spacing:-.02em;color:var(--txt);max-width:820px;margin-bottom:10px;animation:fadeUp .6s .1s ease both;}
.hero h1 em{font-style:italic;color:var(--vert);}
.hero-sub{font-size:clamp(15px,2vw,18px);color:var(--txt2);max-width:560px;font-weight:300;margin-bottom:40px;line-height:1.7;animation:fadeUp .6s .2s ease both;}
.hero-form{display:flex;gap:10px;width:100%;max-width:480px;margin-bottom:16px;animation:fadeUp .6s .3s ease both;}
.hero-form input{flex:1;padding:14px 18px;border:1.5px solid var(--bord);border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;background:#fff;color:var(--txt);outline:none;transition:border .2s;}
.hero-form input:focus{border-color:var(--vert);}
.hero-form input::placeholder{color:var(--txt3);}
.hero-form button{background:var(--vert);color:#fff;border:none;padding:14px 24px;border-radius:10px;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap;transition:background .2s,transform .15s;}
.hero-form button:hover{background:var(--vert-l);transform:translateY(-1px);}
.hero-form button:active{transform:translateY(0);}
.hero-note{font-size:12px;color:var(--txt3);animation:fadeUp .6s .4s ease both;}
.hero-note span{color:var(--vert);font-weight:500;}
.hero-proof{display:flex;align-items:center;gap:12px;margin-top:48px;animation:fadeUp .6s .5s ease both;}
.proof-avatars{display:flex;}
.proof-avatar{width:32px;height:32px;border-radius:50%;border:2px solid var(--creme);margin-left:-8px;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;color:#fff;}
.proof-avatar:first-child{margin-left:0;}
.proof-text{font-size:13px;color:var(--txt2);}
.proof-text strong{color:var(--txt);}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

/* ── NEWSLETTER PREVIEW ── */
.preview-section{padding:0 24px 80px;display:flex;justify-content:center;}
.preview-wrap{width:100%;max-width:900px;background:#fff;border:1px solid var(--bord);border-radius:20px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.06);}
.preview-toolbar{background:#F5F4F0;padding:12px 20px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--bord);}
.tb-dot{width:10px;height:10px;border-radius:50%;}
.tb-url{flex:1;background:#fff;border-radius:6px;padding:5px 12px;font-size:12px;color:var(--txt3);margin:0 12px;border:1px solid var(--bord);}
.preview-body{display:grid;grid-template-columns:1fr 1fr;min-height:300px;}
.preview-left{padding:28px 32px;border-right:1px solid var(--bord);}
.preview-left h3{font-size:13px;font-weight:500;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px;}
.form-field{margin-bottom:12px;}
.form-field label{font-size:12px;color:var(--txt2);display:block;margin-bottom:4px;}
.form-field .ff-input{background:var(--creme);border:1px solid var(--bord);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--txt);width:100%;}
.gen-btn{width:100%;background:var(--vert);color:#fff;border:none;padding:12px;border-radius:8px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:4px;transition:background .2s;}
.gen-btn:hover{background:var(--vert-l);}
.preview-right{padding:0;overflow:hidden;}
.nl-preview{height:100%;}
.nl-header-strip{background:var(--vert);padding:16px 24px;}
.nl-header-co{font-size:10px;font-weight:500;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;}
.nl-header-title{font-family:'Playfair Display',serif;font-size:16px;color:#fff;font-weight:700;}
.nl-content{padding:20px 24px;}
.nl-greeting{font-size:13px;color:var(--txt);margin-bottom:12px;}
.nl-block{margin-bottom:14px;}
.nl-block-title{font-size:12px;font-weight:600;color:var(--vert);margin-bottom:5px;display:flex;align-items:center;gap:5px;}
.nl-block-text{font-size:12px;color:var(--txt2);line-height:1.6;}
.nl-hl{background:var(--vert-xl);border-left:2px solid var(--vert);padding:8px 12px;border-radius:0 6px 6px 0;font-size:12px;color:var(--vert);margin-bottom:14px;}
.nl-cta-btn{display:inline-block;background:var(--vert);color:#fff;font-size:12px;font-weight:500;padding:8px 18px;border-radius:6px;text-decoration:none;}
.nl-footer-strip{background:var(--vert-xs);border-top:1px solid var(--bord);padding:10px 24px;font-size:10px;color:var(--txt3);}

/* ── STATS BAR ── */
.stats-bar{background:var(--vert);padding:32px 24px;display:flex;justify-content:center;gap:0;}
.stat{text-align:center;padding:0 48px;border-right:1px solid rgba(255,255,255,.15);}
.stat:last-child{border:none;}
.stat-num{font-family:'Playfair Display',serif;font-size:36px;font-weight:800;color:#fff;line-height:1;}
.stat-label{font-size:13px;color:rgba(255,255,255,.65);margin-top:4px;font-weight:300;}

/* ── HOW IT WORKS ── */
.how{padding:80px 24px;max-width:900px;margin:0 auto;}
.section-label{font-size:12px;font-weight:500;color:var(--vert);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;}
.section-title{font-family:'Playfair Display',serif;font-size:clamp(28px,4vw,40px);font-weight:700;color:var(--txt);margin-bottom:48px;line-height:1.2;}
.steps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
.step-card{background:#fff;border:1px solid var(--bord);border-radius:16px;padding:28px 24px;position:relative;transition:transform .2s,box-shadow .2s;}
.step-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(45,90,61,.1);}
.step-num{font-family:'Playfair Display',serif;font-size:48px;font-weight:800;color:var(--or-l);line-height:1;margin-bottom:12px;}
.step-icon{width:44px;height:44px;background:var(--vert-xl);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
.step-icon svg{width:20px;height:20px;stroke:var(--vert);fill:none;stroke-width:2;}
.step-title{font-size:15px;font-weight:600;color:var(--txt);margin-bottom:8px;}
.step-desc{font-size:13px;color:var(--txt2);line-height:1.6;}
.step-time{display:inline-block;background:var(--vert-xl);color:var(--vert);font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;margin-top:12px;}

/* ── TARGETS ── */
.targets{background:#fff;padding:80px 24px;border-top:1px solid var(--bord);border-bottom:1px solid var(--bord);}
.targets-inner{max-width:900px;margin:0 auto;}
.targets-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:48px;}
.target-card{border:1px solid var(--bord);border-radius:16px;padding:24px;transition:border-color .2s,transform .2s;}
.target-card:hover{border-color:var(--vert);transform:translateY(-2px);}
.target-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-size:22px;}
.target-name{font-size:15px;font-weight:600;color:var(--txt);margin-bottom:8px;}
.target-desc{font-size:13px;color:var(--txt2);line-height:1.6;margin-bottom:14px;}
.target-ex{font-size:12px;color:var(--txt3);font-style:italic;}

/* ── PRICING ── */
.pricing{padding:80px 24px;max-width:900px;margin:0 auto;}
.pricing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:48px;}
.price-card{border:1px solid var(--bord);border-radius:16px;padding:28px 24px;background:#fff;position:relative;}
.price-card.featured{border:2px solid var(--vert);background:var(--vert-xs);}
.price-badge{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--vert);color:#fff;font-size:10px;font-weight:600;padding:3px 12px;border-radius:20px;white-space:nowrap;}
.price-name{font-size:13px;font-weight:500;color:var(--txt2);margin-bottom:8px;}
.price-amount{font-family:'Playfair Display',serif;font-size:36px;font-weight:800;color:var(--txt);line-height:1;}
.price-amount span{font-size:14px;font-weight:400;font-family:'DM Sans',sans-serif;color:var(--txt3);}
.price-desc{font-size:13px;color:var(--txt2);margin:12px 0 20px;line-height:1.5;}
.price-features{list-style:none;margin-bottom:24px;}
.price-features li{font-size:13px;color:var(--txt2);padding:6px 0;border-bottom:1px solid var(--bord);display:flex;align-items:center;gap:8px;}
.price-features li:last-child{border:none;}
.price-features li::before{content:'✓';color:var(--vert);font-weight:600;flex-shrink:0;}
.price-btn{display:block;text-align:center;padding:12px;border-radius:8px;font-size:13px;font-weight:500;text-decoration:none;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;width:100%;transition:all .2s;}
.price-btn-outline{background:#fff;color:var(--vert);border:1.5px solid var(--vert);}
.price-btn-outline:hover{background:var(--vert-xl);}
.price-btn-solid{background:var(--vert);color:#fff;}
.price-btn-solid:hover{background:var(--vert-l);}

/* ── FAQ ── */
.faq{background:var(--vert-xs);padding:80px 24px;border-top:1px solid var(--bord);}
.faq-inner{max-width:680px;margin:0 auto;}
.faq-item{background:#fff;border:1px solid var(--bord);border-radius:12px;padding:20px 24px;margin-bottom:10px;cursor:pointer;}
.faq-q{font-size:15px;font-weight:500;color:var(--txt);display:flex;justify-content:space-between;align-items:center;gap:16px;}
.faq-q::after{content:'+';font-size:20px;color:var(--vert);flex-shrink:0;transition:transform .2s;}
.faq-item.open .faq-q::after{transform:rotate(45deg);}
.faq-a{font-size:13px;color:var(--txt2);line-height:1.7;max-height:0;overflow:hidden;transition:max-height .3s ease,margin .3s ease;}
.faq-item.open .faq-a{max-height:200px;margin-top:12px;}

/* ── CTA FINAL ── */
.cta-final{background:var(--vert);padding:80px 24px;text-align:center;}
.cta-final h2{font-family:'Playfair Display',serif;font-size:clamp(28px,4vw,44px);font-weight:800;color:#fff;margin-bottom:12px;line-height:1.2;}
.cta-final p{font-size:16px;color:rgba(255,255,255,.7);margin-bottom:36px;font-weight:300;}
.cta-form{display:flex;gap:10px;justify-content:center;max-width:440px;margin:0 auto 16px;}
.cta-form input{flex:1;padding:14px 18px;border:none;border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;}
.cta-form button{background:var(--or);color:#fff;border:none;padding:14px 22px;border-radius:10px;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap;transition:opacity .2s;}
.cta-form button:hover{opacity:.85;}
.cta-note{font-size:12px;color:rgba(255,255,255,.5);}

/* ── FOOTER ── */

</footer>

<script defer src="https://sibforms.com/forms/end-form/build/main.js"></script>
<script>
function toggleFaq(el) {
  const isOpen = el.classList.contains('open');
  document.querySelectorAll('.faq-item').forEach(i => i.classList.remove('open'));
  if (!isOpen) el.classList.add('open');
}
window.addEventListener('scroll', () => {
  const nav = document.querySelector('nav');
  nav.style.boxShadow = window.scrollY > 20 ? '0 2px 20px rgba(0,0,0,.08)' : 'none';
});

// INTERCEPTEUR RGPD - Ce code s'assure que la case est cochée avant de laisser Brevo envoyer le formulaire
document.addEventListener('DOMContentLoaded', function() {
  var form = document.getElementById('sib-form');
  if(form) {
    form.addEventListener('submit', function(event) {
      var rgpdCheckbox = document.getElementById('RGPD');
      if (rgpdCheckbox && !rgpdCheckbox.checked) {
        event.preventDefault(); // Stoppe l'envoi classique
        event.stopImmediatePropagation(); // Stoppe le script de Brevo
        alert('Veuillez cocher la case de confidentialité pour valider votre inscription.');
      }
    }, true); // Le "true" est essentiel : il force ce script à s'exécuter AVANT celui de Brevo
  }
});
</script>
